version: '3.8'

# ╔══════════════════════════════════════════════════════════════════╗
# ║  TP DevOps M2 — stack e-commerce                                ║
# ║  Le front est fourni. Votre mission :                           ║
# ║  1. Compléter ce docker-compose (health checks, depends_on…)   ║
# ║  2. Dockeriser chaque service (multi-stage build)               ║
# ║  3. Instrumenter les services avec prom-client                  ║
# ║  4. Ajouter Prometheus + Grafana + Alertmanager                 ║
# ╚══════════════════════════════════════════════════════════════════╝

services:

  # ── Front (fourni, ne pas modifier) ──────────────────────────────
  front:
    build: ./front
    ports:
      - "8080:80"
    networks:
      - devshop
    restart: unless-stopped

  # ── Service Catalogue ─────────────────────────────────────────────
  catalogue:
    build: ./services/catalogue
    ports:
      - "3001:3001"
    networks:
      - devshop
    restart: unless-stopped
    # TODO : ajouter healthcheck — DONE
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Service Panier ────────────────────────────────────────────────
  panier:
    build: ./services/panier
    ports:
      - "3002:3002"
    networks:
      - devshop
    restart: unless-stopped
    # TODO : healthcheck + depends_on catalogue — DONE
    depends_on:
      catalogue:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Service Commandes ─────────────────────────────────────────────
  commandes:
    build: ./services/commandes
    ports:
      - "3003:3003"
    networks:
      - devshop
    restart: unless-stopped
    # TODO : healthcheck + depends_on panier — DONE (+ notifications)
    depends_on:
      panier:
        condition: service_healthy
      notifications:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Service Notifications ─────────────────────────────────────────
  notifications:
    build: ./services/notifications
    ports:
      - "3004:3004"
    networks:
      - devshop
    restart: unless-stopped
    # TODO : healthcheck — DONE
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Prometheus ────────────────────────────────────────────────────
  # TODO : décommenter et configurer — DONE
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml
    ports:
      - "9090:9090"
    networks:
      - devshop
    restart: unless-stopped

  # ── Grafana ───────────────────────────────────────────────────────
  # TODO : décommenter et configurer — DONE
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - devshop
    restart: unless-stopped
    depends_on:
      - prometheus

  # ── Alertmanager ──────────────────────────────────────────────────
  # TODO : décommenter et configurer — DONE
  alertmanager:
    image: prom/alertmanager:latest
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"
    networks:
      - devshop
    restart: unless-stopped

networks:
  devshop:
    driver: bridge

volumes:
  grafana_data:
