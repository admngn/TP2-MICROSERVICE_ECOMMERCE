<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>DevShop 🛒</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

    header {
      background: #1e293b;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #00b4d8;
    }
    header h1 { font-size: 1.4rem; color: #00b4d8; }
    #cart-btn {
      background: #00b4d8; color: #0f172a; border: none;
      padding: .5rem 1.2rem; border-radius: 8px; cursor: pointer;
      font-weight: bold; font-size: 1rem;
    }

    main { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }

    #status-bar {
      display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap;
    }
    .svc-badge {
      padding: .3rem .8rem; border-radius: 20px; font-size: .8rem; font-weight: bold;
      background: #1e293b; border: 1px solid #334155;
    }
    .svc-badge.ok { border-color: #2ec4b6; color: #2ec4b6; }
    .svc-badge.ko { border-color: #f44336; color: #f44336; }

    h2 { margin-bottom: 1rem; font-size: 1.1rem; color: #94a3b8; text-transform: uppercase; letter-spacing: .05em; }

    #products {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.2rem;
    }
    .product-card {
      background: #1e293b; border-radius: 12px; padding: 1.2rem;
      border: 1px solid #334155; display: flex; flex-direction: column; gap: .6rem;
    }
    .product-card .emoji { font-size: 2.5rem; text-align: center; }
    .product-card .name { font-weight: bold; font-size: 1rem; }
    .product-card .price { color: #00b4d8; font-weight: bold; }
    .product-card .stock { font-size: .8rem; color: #64748b; }
    .product-card button {
      margin-top: auto; background: #0d9488; color: white; border: none;
      padding: .5rem; border-radius: 8px; cursor: pointer; font-weight: bold;
    }
    .product-card button:hover { background: #0f766e; }

    /* Cart modal */
    #cart-modal {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.6); z-index: 100;
      align-items: center; justify-content: center;
    }
    #cart-modal.open { display: flex; }
    #cart-box {
      background: #1e293b; border-radius: 16px; padding: 2rem;
      width: 420px; max-width: 95vw; border: 1px solid #334155;
    }
    #cart-box h3 { margin-bottom: 1rem; color: #00b4d8; }
    #cart-items { margin-bottom: 1rem; min-height: 60px; }
    .cart-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: .5rem 0; border-bottom: 1px solid #334155; font-size: .95rem;
    }
    .cart-item button { background: none; border: none; color: #f44336; cursor: pointer; font-size: 1.1rem; }
    #cart-total { text-align: right; font-weight: bold; color: #2ec4b6; margin-bottom: 1rem; }
    #checkout-btn {
      width: 100%; background: #00b4d8; color: #0f172a; border: none;
      padding: .7rem; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1rem;
    }
    #close-cart {
      float: right; background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 1.3rem;
    }

    /* Notif toast */
    #toast {
      position: fixed; bottom: 2rem; right: 2rem;
      background: #2ec4b6; color: #0f172a; padding: .8rem 1.4rem;
      border-radius: 10px; font-weight: bold; font-size: .95rem;
      opacity: 0; transition: opacity .3s; pointer-events: none;
    }
    #toast.show { opacity: 1; }

    #orders-section { margin-top: 3rem; }
    #orders-list { display: flex; flex-direction: column; gap: .6rem; margin-top: .5rem; }
    .order-row {
      background: #1e293b; border-radius: 8px; padding: .8rem 1rem;
      display: flex; justify-content: space-between; align-items: center;
      border-left: 4px solid #00b4d8; font-size: .9rem;
    }
    .order-row .order-status { font-size: .8rem; padding: .2rem .6rem; border-radius: 12px; background: #0d9488; color: white; }
  </style>
</head>
<body>
<header>
  <h1>🛒 DevShop</h1>
  <button id="cart-btn">🛒 Panier (<span id="cart-count">0</span>)</button>
</header>

<main>
  <div id="status-bar">
    <span class="svc-badge" id="badge-catalogue">● Catalogue</span>
    <span class="svc-badge" id="badge-panier">● Panier</span>
    <span class="svc-badge" id="badge-commandes">● Commandes</span>
    <span class="svc-badge" id="badge-notifications">● Notifications</span>
  </div>

  <h2>Nos produits</h2>
  <div id="products"><p style="color:#64748b">Chargement…</p></div>

  <div id="orders-section">
    <h2>Mes commandes</h2>
    <div id="orders-list"><p style="color:#64748b">Aucune commande.</p></div>
  </div>
</main>

<!-- Cart modal -->
<div id="cart-modal">
  <div id="cart-box">
    <button id="close-cart">✕</button>
    <h3>Mon panier</h3>
    <div id="cart-items"><p style="color:#64748b;font-size:.9rem">Panier vide</p></div>
    <div id="cart-total"></div>
    <button id="checkout-btn">Passer la commande</button>
  </div>
</div>

<div id="toast"></div>

<script>
const API = {
  catalogue:     'http://localhost:3001',
  panier:        'http://localhost:3002',
  commandes:     'http://localhost:3003',
  notifications: 'http://localhost:3004',
};

// ── Health checks ──────────────────────────────────────────────────────────
async function checkHealth(name, url) {
  const badge = document.getElementById('badge-' + name);
  try {
    const r = await fetch(url + '/health', { signal: AbortSignal.timeout(2000) });
    const ok = r.ok;
    badge.className = 'svc-badge ' + (ok ? 'ok' : 'ko');
    badge.textContent = (ok ? '✓' : '✗') + ' ' + name.charAt(0).toUpperCase() + name.slice(1);
  } catch {
    badge.className = 'svc-badge ko';
    badge.textContent = '✗ ' + name.charAt(0).toUpperCase() + name.slice(1);
  }
}
function checkAllHealth() {
  Object.entries(API).forEach(([name, url]) => checkHealth(name, url));
}
checkAllHealth();
setInterval(checkAllHealth, 10000);

// ── Toast ──────────────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Products ───────────────────────────────────────────────────────────────
async function loadProducts() {
  try {
    const r = await fetch(API.catalogue + '/products');
    const products = await r.json();
    const grid = document.getElementById('products');
    grid.innerHTML = '';
    products.forEach(p => {
      const card = document.createElement('div');
      card.className = 'product-card';
      card.innerHTML = `
        <div class="emoji">${p.emoji}</div>
        <div class="name">${p.name}</div>
        <div class="price">${p.price.toFixed(2)} €</div>
        <div class="stock">Stock : ${p.stock}</div>
        <button onclick="addToCart(${JSON.stringify(p).replace(/"/g,'&quot;')})">Ajouter au panier</button>
      `;
      grid.appendChild(card);
    });
  } catch {
    document.getElementById('products').innerHTML = '<p style="color:#f44336">Service Catalogue indisponible</p>';
  }
}
loadProducts();

// ── Cart ───────────────────────────────────────────────────────────────────
let cartItems = [];

async function addToCart(product) {
  try {
    await fetch(API.panier + '/cart', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ productId: product.id, name: product.name, price: product.price }),
    });
    cartItems.push(product);
    document.getElementById('cart-count').textContent = cartItems.length;
    toast('✓ ' + product.name + ' ajouté au panier');
  } catch {
    toast('⚠ Service Panier indisponible');
  }
}

async function openCart() {
  document.getElementById('cart-modal').classList.add('open');
  try {
    const r = await fetch(API.panier + '/cart');
    cartItems = await r.json();
    renderCart(cartItems);
  } catch {
    document.getElementById('cart-items').innerHTML = '<p style="color:#f44336">Impossible de charger le panier</p>';
  }
}

function renderCart(items) {
  const el = document.getElementById('cart-items');
  if (!items.length) { el.innerHTML = '<p style="color:#64748b;font-size:.9rem">Panier vide</p>'; return; }
  el.innerHTML = items.map((it, i) => `
    <div class="cart-item">
      <span>${it.name}</span>
      <span>${it.price.toFixed(2)} €
        <button onclick="removeFromCart(${i})">✕</button>
      </span>
    </div>`).join('');
  const total = items.reduce((s, it) => s + it.price, 0);
  document.getElementById('cart-total').textContent = 'Total : ' + total.toFixed(2) + ' €';
  document.getElementById('cart-count').textContent = items.length;
}

async function removeFromCart(index) {
  const item = cartItems[index];
  try {
    await fetch(API.panier + '/cart/' + item.productId, { method: 'DELETE' });
    cartItems.splice(index, 1);
    renderCart(cartItems);
  } catch { toast('⚠ Erreur lors de la suppression'); }
}

async function checkout() {
  if (!cartItems.length) { toast('⚠ Panier vide'); return; }
  try {
    const r = await fetch(API.commandes + '/orders', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items: cartItems }),
    });
    const order = await r.json();
    await fetch(API.panier + '/cart', { method: 'DELETE' });
    cartItems = [];
    renderCart([]);
    document.getElementById('cart-modal').classList.remove('open');
    toast('🎉 Commande #' + order.id + ' passée !');
    loadOrders();
  } catch { toast('⚠ Erreur lors de la commande'); }
}

document.getElementById('cart-btn').addEventListener('click', openCart);
document.getElementById('close-cart').addEventListener('click', () => document.getElementById('cart-modal').classList.remove('open'));
document.getElementById('checkout-btn').addEventListener('click', checkout);

// ── Orders ─────────────────────────────────────────────────────────────────
async function loadOrders() {
  try {
    const r = await fetch(API.commandes + '/orders');
    const orders = await r.json();
    const el = document.getElementById('orders-list');
    if (!orders.length) { el.innerHTML = '<p style="color:#64748b">Aucune commande.</p>'; return; }
    el.innerHTML = orders.map(o => `
      <div class="order-row">
        <span>Commande #${o.id} — ${o.items.length} article(s) — ${o.total.toFixed(2)} €</span>
        <span class="order-status">${o.status}</span>
      </div>`).join('');
  } catch {
    document.getElementById('orders-list').innerHTML = '<p style="color:#f44336">Service Commandes indisponible</p>';
  }
}
loadOrders();
</script>
</body>
</html>
